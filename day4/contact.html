<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Contact Form</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(circle at top left,#8b5cf6 0%,transparent 35%),
    radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%),
    linear-gradient(135deg,#0f172a,#111827,#020617);
}

.contact-container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:24px;
    padding:40px;
    box-shadow:
    0 20px 50px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.08);
    animation:float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-family:'Manrope',sans-serif;
    color:#fff;
    font-size:2.2rem;
    font-weight:700;
    margin-bottom:10px;
}

.header p{
    color:#cbd5e1;
    font-size:0.95rem;
    line-height:1.6;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.full-width{
    grid-column:1 / -1;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    color:#e2e8f0;
    margin-bottom:8px;
    font-size:0.9rem;
    font-weight:500;
}

input,
textarea{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.06);
    color:#fff;
    font-size:15px;
    outline:none;
    transition:all 0.35s ease;
}

input::placeholder,
textarea::placeholder{
    color:#94a3b8;
}

input:focus,
textarea:focus{
    border-color:#60a5fa;
    box-shadow:0 0 20px rgba(96,165,250,0.35);
    transform:translateY(-2px);
}

textarea{
    resize:vertical;
    min-height:140px;
}

.submit-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:1rem;
    font-weight:600;
    color:#fff;
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    transition:all 0.35s ease;
    margin-top:10px;
}

.submit-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 30px rgba(99,102,241,0.4);
}

.submit-btn:active{
    transform:translateY(0);
}

.required{
    color:#fb7185;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .contact-container{
        padding:25px;
    }

    .header h1{
        font-size:1.8rem;
    }
}
</style>
</head>
<body>

<div class="contact-container">

    <div class="header">
        <h1>Get In Touch</h1>
        <p>
            We'd love to hear from you. Fill out the form below and
            we'll get back to you as soon as possible.
        </p>
    </div>

    <form>

        <div class="form-grid">

            <div class="form-group">
                <label for="name">
                    Full Name <span class="required">*</span>
                </label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required>
            </div>

            <div class="form-group">
                <label for="email">
                    Email Address <span class="required">*</span>
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your@email.com"
                    required>
            </div>

            <div class="form-group">
                <label for="phone">
                    Phone Number
                </label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="+91 98765 43210">
            </div>

            <div class="form-group">
                <label for="subject">
                    Subject <span class="required">*</span>
                </label>
                <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Enter subject"
                    required>
            </div>

            <div class="form-group full-width">
                <label for="message">
                    Message <span class="required">*</span>
                </label>
                <textarea
                    id="message"
                    name="message"
                    placeholder="Write your message here..."
                    required></textarea>
            </div>

            <div class="full-width">
                <button type="submit" class="submit-btn">
                    Send Message
                </button>
            </div>

        </div>

    </form>

</div>

</body>
</html>
